name: "Tribunais e APIs Judiciais"
description: "Mapeamento de tribunais brasileiros, sistemas processuais e endpoints de API"

sistemas_processuais:
  pje:
    nome: "Processo Judicial Eletrônico"
    protocolo: "SOAP/XML (MNI 2.2.2)"
    autenticacao: "Certificado digital ICP-Brasil"
    documentacao: "https://www.cnj.jus.br/programas-e-acoes/pje/"

  esaj:
    nome: "e-SAJ (Sistema de Automação da Justiça)"
    protocolo: "REST/JSON"
    autenticacao: "Certificado digital + token"
    documentacao: "https://esaj.tjsp.jus.br"

  eproc:
    nome: "e-Proc"
    protocolo: "REST/JSON"
    autenticacao: "Certificado digital"
    documentacao: "https://eproc.jfpr.jus.br"

  projudi:
    nome: "PROJUDI"
    protocolo: "SOAP/XML"
    autenticacao: "Certificado digital"
    documentacao: "https://projudi.tjpr.jus.br"

  datajud:
    nome: "DataJud (CNJ)"
    protocolo: "REST/JSON"
    autenticacao: "API Key"
    base_url: "https://datajud-wiki.cnj.jus.br"
    rate_limit: "100 requisições/minuto"

tribunais_estaduais:
  tjsp:
    nome: "Tribunal de Justiça de São Paulo"
    sigla: "TJSP"
    sistema: "esaj"
    dje: "https://dje.tjsp.jus.br"
  tjrj:
    nome: "Tribunal de Justiça do Rio de Janeiro"
    sigla: "TJRJ"
    sistema: "pje"
    dje: "https://www3.tjrj.jus.br/consultadje"
  tjmg:
    nome: "Tribunal de Justiça de Minas Gerais"
    sigla: "TJMG"
    sistema: "pje"
    dje: "https://www.tjmg.jus.br/portal-tjmg/dje/"
  tjrs:
    nome: "Tribunal de Justiça do Rio Grande do Sul"
    sigla: "TJRS"
    sistema: "eproc"
    dje: "https://www.tjrs.jus.br/dje"
  tjpr:
    nome: "Tribunal de Justiça do Paraná"
    sigla: "TJPR"
    sistema: "projudi"
    dje: "https://portal.tjpr.jus.br/dje"
  tjba:
    nome: "Tribunal de Justiça da Bahia"
    sigla: "TJBA"
    sistema: "pje"
    dje: "https://www.tjba.jus.br/dje"
  tjpe:
    nome: "Tribunal de Justiça de Pernambuco"
    sigla: "TJPE"
    sistema: "pje"
