name: "Tabela de Custas Judiciais - Referência"
description: "Referência de custas judiciais por tribunal (valores aproximados, sujeitos a atualização)"
aviso: "Valores de referência. Consultar tabela oficial do tribunal para valores atualizados."

justica_federal:
