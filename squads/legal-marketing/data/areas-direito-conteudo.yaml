formatos_por_plataforma:
  blog:
    formato: "artigo_longo"
    palavras: "1500-3000"
    frequencia: "2-4 posts/semana"
    foco: "SEO, profundidade, autoridade"

  linkedin:
    formato: "artigo_curto ou post"
    palavras: "200-1300"
    frequencia: "3-5 posts/semana"
    foco: "Networking, autoridade, B2B"

  instagram:
    formato: "carrossel ou reels"
    palavras: "50-200 (legenda)"
    frequencia: "3-5 posts/semana"
    foco: "Visual, acessibilidade, engajamento"

  newsletter:
    formato: "curadoria + artigo"
    palavras: "500-1000"
    frequencia: "1-2/semana"
    foco: "Fidelização, nurturing"

  youtube:
    formato: "video_educativo"
    duracao: "5-15 minutos"
    frequencia: "1-2 videos/semana"
    foco: "Autoridade, alcance, SEO"
