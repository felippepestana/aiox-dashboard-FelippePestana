name: "Áreas do Direito para Conteúdo"
description: "Mapeamento de áreas do direito com temas para produção de conteúdo jurídico"

areas:
  direito_civil:
    nome: "Direito Civil"
    descricao: "Relações jurídicas entre particulares"
